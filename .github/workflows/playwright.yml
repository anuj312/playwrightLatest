name: Playwright Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to run (@smoke, @regression, etc.)"
        required: true
        default: "@smoke"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]
        shardIndex: [1, 2]

    steps:
      # 📥 Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🟢 Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 📦 Install dependencies
      - name: Install dependencies
        run: npm ci

      # 🌐 Install browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 🧪 Run tests with TAG + SHARD + BROWSER
      - name: Run Playwright Tests
        run: |
          npx playwright test \
          --project=${{ matrix.browser }} \
          --shard=${{ matrix.shardIndex }}/2 \
          -g "${{ github.event.inputs.tag }}"

      # 📊 Upload HTML report
      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.shardIndex }}
          path: playwright-report/

      # 📸 Upload screenshots/videos (if enabled)
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.browser }}-${{ matrix.shardIndex }}
          path: test-results/