name: Playwright Tests

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to run (@smoke, @regression, etc.)"
        required: true
        default: "@smoke"

      browser:
        description: "Browser (chromium/firefox/webkit)"
        required: true
        default: "chromium"

      workers:
        description: "Number of parallel workers"
        required: true
        default: "2"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]   # 🔥 2 shards (parallel split)

    steps:
      # 📥 Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 🟢 Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 📦 Install dependencies
      - name: Install dependencies
        run: npm ci

      # 🌐 Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # 🧪 Run tests (dynamic)
      - name: Run Playwright Tests
        run: |
          npx playwright test \
          --project=${{ github.event.inputs.browser }} \
          --workers=${{ github.event.inputs.workers }} \
          --shard=${{ matrix.shardIndex }}/2 \
          -g "${{ github.event.inputs.tag }}"

      # 📊 Upload HTML report
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.shardIndex }}
          path: playwright-report/

      # 📸 Upload screenshots/videos
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shardIndex }}
          path: test-results/